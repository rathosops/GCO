# ============================================
# Docker Compose - CMI-PCG Backend (Server)
# ============================================
#
# Containers:
#   - cmi-pcg-server-app    (Flask :5000)
#   - cmi-pcg-server-db     (Postgres :5432)
#   - cmi-pcg-server-redis  (Redis :6379)
#   - cmi-pcg-server-celery (Celery worker)
#
# Redes:
#   - cmi-network (compartilhada com frontend)
#
# ============================================

x-common-env: &common_env
  TZ: America/Sao_Paulo

  # Redis / Celery
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  CACHE_DEFAULT_TIMEOUT: "60"

  # Logging (DEV: console colorido)
  LOG_LEVEL: INFO
  LOG_FORMAT: console
  LOG_SQLALCHEMY_LEVEL: WARNING
  LOG_WERKZEUG_LEVEL: INFO

  # Python runtime
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

services:
  app:
    build: .
    container_name: cmi-pcg-server-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      <<: *common_env
      FLASK_ENV: development
      FLASK_APP: app.app_factory:create_app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - reports_data:/app/reports
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:5000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cmi-network

  celery_worker:
    build: .
    container_name: cmi-pcg-server-celery
    restart: always
    command: celery -A app.celery_app.celery worker -l info
    environment:
      <<: *common_env
      # Worker não precisa de FLASK_ENV, mas pode ajudar a manter o mesmo comportamento.
      FLASK_ENV: development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - reports_data:/app/reports
    networks:
      - cmi-network

  redis:
    image: redis:8.4.0-alpine3.22
    container_name: cmi-pcg-server-redis
    restart: always
    # Persistência: AOF com fsync a cada segundo.
    # Garante no máximo 1s de perda de dados em caso de crash,
    # sem impacto relevante de performance no Raspberry Pi.
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cmi-network

  db:
    image: postgres:17.5-alpine
    container_name: cmi-pcg-server-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./utils_scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cmi-network

volumes:
  postgres_data:
  reports_data:
  redis_data:

networks:
  cmi-network:
    name: cmi-network
    driver: bridge