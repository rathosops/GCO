name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: gco_test
          POSTGRES_USER: gco
          POSTGRES_PASSWORD: gco
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gco -d gco_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://gco:gco@127.0.0.1:5432/gco_test
      REDIS_URL: redis://127.0.0.1:6379/0
      SECRET_KEY: ci-secret-key-change-before-production
      ENVIRONMENT: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Alembic migrations
        run: alembic upgrade head

      - name: Alembic model drift
        run: alembic check

      - name: Tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No backend tests directory yet"
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compose config
        run: docker compose config

      - name: Build API and web images
        run: docker compose build api web
