# ============================================
# Nginx Configuration - CMI-PCG Frontend
# Resolve:
# - PID permission (runs as USER nginx) => pid in /tmp
# - "user" directive warning => removed
# - duplicate Date header from upstream => proxy_hide_header Date/Server
# - SPA routing + /api proxy with Docker DNS
# ============================================

worker_processes auto;

# Como o container roda como USER nginx, /var/run pode dar permission denied.
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  keepalive_timeout 65;

  # logs (reduzidos)
  access_log off;
  error_log /var/log/nginx/error.log warn;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_types
      text/plain
      text/css
      text/xml
      text/javascript
      application/javascript
      application/x-javascript
      application/xml
      application/xml+rss
      application/json
      application/vnd.ms-fontobject
      application/x-font-ttf
      font/opentype
      image/svg+xml
      image/x-icon;
  gzip_disable "msie6";

  server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # buffers / limits
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    client_max_body_size 50m;
    large_client_header_buffers 4 8k;

    # timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ------------------------------------------
    # Assets estáticos (cache forte)
    # ------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;

      open_file_cache max=1000 inactive=20s;
      open_file_cache_valid 30s;
      open_file_cache_min_uses 2;
      open_file_cache_errors on;
    }

    # Evita spam de log se faltar o logo (mas o ideal é colocar em /public/logo.svg)
    location = /logo.svg {
      access_log off;
      log_not_found off;
      try_files /logo.svg =204;
    }

    # ------------------------------------------
    # SPA - fallback para index.html
    # ------------------------------------------
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Cache control do index (evita cache agressivo)
    location = /index.html {
      expires 5m;
      add_header Cache-Control "public, must-revalidate";
    }

    # ------------------------------------------
    # Health
    # ------------------------------------------
    location /health {
      access_log off;
      add_header Content-Type text/plain;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      return 200 "healthy\n";
    }

    # ------------------------------------------
    # API proxy (/api -> backend)
    # ------------------------------------------
    location /api/ {
      # DNS interno do Docker
      resolver 127.0.0.11 valid=10s ipv6=off;
      resolver_timeout 5s;

      set $backend_host "cmi-pcg-server-app";
      set $backend_port "5000";

      # tira o /api do path antes de mandar pro backend
      rewrite ^/api/(.*)$ /$1 break;

      proxy_pass http://$backend_host:$backend_port;

      proxy_http_version 1.1;

      # headers essenciais
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # evita "Connection: close" indevido
      proxy_set_header Connection "";

      # 🔥 remove headers duplicados vindos do upstream (Date/Server)
      proxy_hide_header Date;
      proxy_hide_header Server;

      # timeouts
      proxy_connect_timeout 10s;
      proxy_send_timeout 120s;
      proxy_read_timeout 120s;

      # 🔥 melhor para PDF/blob grande: stream (evita temp file do nginx)
      proxy_buffering off;

      proxy_intercept_errors on;
      error_page 502 503 504 = @backend_offline;
    }

    location @backend_offline {
      default_type application/json;
      return 503 '{"error":"Backend indisponível","message":"O servidor backend não está respondendo. Verifique se o container cmi-pcg-server-app está rodando.","status":503}';
    }

    # bloquear arquivos sensíveis
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    location ~ ~$ {
      deny all;
      access_log off;
      log_not_found off;
    }
  }
}
