# ============================================
# Docker Compose - CMI Sistema de Chamadas
# ============================================
#
# Containers:
#   - cmi-chamadas-backend  (FastAPI :5001)
#   - cmi-chamadas-frontend (React :3001)
#
# Utiliza recursos compartilhados:
#   - DB: cmi-pcg-server-db (Postgres :5432)
#   - Redis: cmi-pcg-server-redis (:6379)
#   - Network: cmi-network
#
# ============================================

x-common-env: &common_env
  TZ: America/Sao_Paulo
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

services:
  # ==========================================
  # Backend - FastAPI
  # ==========================================
  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmi-chamadas-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 5001 --reload
    ports:
      - "5001:5001"
    environment:
      <<: *common_env

      # Banco de dados (usa o mesmo do sistema principal - container cmi-pcg-server-db)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-admin1234}@cmi-pcg-server-db:5432/${POSTGRES_DB:-clinicacmi}

      # Redis (usa o mesmo do sistema principal - container cmi-pcg-server-redis)
      REDIS_URL: redis://cmi-pcg-server-redis:6379/3

      # Configurações da aplicação
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      API_VERSION: v1

      # CORS (permite frontend e sistema principal)
      # Vai ficar praticamente irrelevante se o frontend falar sempre via /api no mesmo host,
      # mas mantemos para compatibilidade com outros clientes.
      CORS_ORIGINS: "http://localhost:3001,http://localhost:3000,http://localhost:5000"

      # WebSocket
      WS_HEARTBEAT_INTERVAL: 30
      WS_MAX_CONNECTIONS: 100

      # JWT
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: 480

    env_file:
      - .env
    volumes:
      - ./backend:/app
      - chamadas_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cmi-network

  # ==========================================
  # Frontend - React + TypeScript
  # ==========================================
  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Usando caminhos relativos para funcionar de qualquer IP/host
        VITE_API_URL: /api
        VITE_WS_URL: /ws
    container_name: cmi-chamadas-frontend
    ports:
      - "3001:80"
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cmi-network

volumes:
  chamadas_logs:
    name: cmi-chamadas-logs

# Utiliza a rede do sistema principal
networks:
  cmi-network:
    external: true
    name: cmi-network
